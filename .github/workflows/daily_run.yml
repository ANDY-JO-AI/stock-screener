name: Andy Jo Stock AI — 일일 자동 실행

on:
  schedule:
    # 한국시간 기준 (UTC+9)
    - cron: '0 21 * * 1-5'   # 평일 오전 06:00 KST (전일 21:00 UTC)
    - cron: '30 23 * * 1-5'  # 평일 오전 08:30 KST
    - cron: '0 2 * * 1-5'    # 평일 오전 11:00 KST
    - cron: '0 5 * * 1-5'    # 평일 오후 14:00 KST
    - cron: '0 7 * * 1-5'    # 평일 오후 16:00 KST
    - cron: '30 8 * * 1-5'   # 평일 오후 17:30 KST (장마감 후)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # 최대 55분 (무료 한도 보호)

    steps:
      # 1. 코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # 2. Python 설정
      - name: Python 3.10 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 패키지 설치
      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 메인 파이프라인 실행
      - name: Andy Jo Stock AI 파이프라인 실행
        env:
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python main.py

      # 5. 실행 결과 로그 업로드 (실패해도 항상 저장)
      - name: 실행 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
