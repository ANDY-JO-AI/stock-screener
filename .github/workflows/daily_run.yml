name: Daily Stock Filter

on:
  schedule:
    # KST 19:00 = UTC 10:00
    - cron: '0 10 * * 1-5'
    # KST 19:30 — 시간외 특징주용 (DART 공시 수집)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-filter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market report
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python market_report.py

      - name: Run filter engine
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python filter_engine.py

      - name: Run after-hours collector
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python after_hours.py
